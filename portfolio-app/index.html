<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>FinFolio — Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg:        #07090f;
        --surface:   #0b0f1a;
        --surface2:  #0f1623;
        --surface3:  #141d2e;
        --border:    #1a2235;
        --border2:   #243049;
        --text:      #e2e8f0;
        --text2:     #8899a6;
        --text3:     #4a5568;
        --cyan:      #22d3ee;
        --cyan-dim:  rgba(34,211,238,0.12);
        --green:     #4ade80;
        --green-dim: rgba(74,222,128,0.12);
        --red:       #f87171;
        --red-dim:   rgba(248,113,113,0.12);
        --orange:    #fb923c;
        --orange-dim:rgba(251,146,60,0.12);
        --purple:    #a78bfa;
        --purple-dim:rgba(167,139,250,0.12);
        --indigo:    #818cf8;
        --indigo-dim:rgba(129,140,248,0.12);
        --radius:    6px;
        --radius-sm: 4px;
        --radius-lg: 8px;
        --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      }

      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body {
        font-family: var(--font-mono);
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        font-size: 13px;
        line-height: 1.5;
      }

      /* ── Layout ─────────────────────────────────────────── */
      .app-shell { min-height: 100vh; display: flex; flex-direction: column; }

      .app-header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .app-header-inner {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 20px;
        height: 56px;
      }

      /* Brand */
      .app-title {
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text);
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .app-title::before {
        content: '';
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--green);
        flex-shrink: 0;
      }
      .app-title span { color: var(--cyan); }
      .app-title-dot { color: var(--cyan); margin: 0 1px; }
      .app-title-sub {
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 4px;
        color: var(--text3);
        text-transform: uppercase;
        margin-left: 4px;
        align-self: flex-end;
        margin-bottom: 2px;
      }

      .app-content { max-width: 1400px; margin: 0 auto; padding: 20px; width: 100%; flex: 1; }

      /* ── Nav tabs ───────────────────────────────────────── */
      .tab-nav { display: flex; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none; }
      .tab-nav::-webkit-scrollbar { display: none; }
      .tab-btn {
        padding: 6px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        background: transparent;
        color: var(--text3);
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.12s;
        font-family: var(--font-mono);
      }
      .tab-btn:hover { color: var(--text2); background: var(--surface2); }
      .tab-btn.active {
        background: var(--cyan-dim);
        color: var(--cyan);
        border-color: rgba(34,211,238,0.25);
      }

      /* ── KPI cards ──────────────────────────────────────── */
      .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-bottom: 18px; }
      .kpi-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        position: relative;
        overflow: hidden;
      }
      .kpi-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
      }
      .kpi-label {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text3);
        margin-bottom: 8px;
      }
      .kpi-value { font-size: 22px; font-weight: 800; line-height: 1.1; letter-spacing: -0.5px; }
      .kpi-sub { font-size: 11px; font-weight: 600; margin-top: 4px; }

      /* ── Cards ──────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        margin-bottom: 12px;
      }
      .card-lg {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 18px;
      }
      .card-title { font-size: 12px; font-weight: 700; letter-spacing: 0.6px; color: var(--text); margin: 0 0 14px 0; text-transform: uppercase; }

      /* ── Sections ───────────────────────────────────────── */
      .section { margin-bottom: 20px; }
      .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
      .section-title { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); margin: 0; }

      /* ── Division card ──────────────────────────────────── */
      .div-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 10px;
        overflow: hidden;
        transition: border-color 0.15s;
      }
      .div-card:hover { border-color: var(--border2); }
      .div-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; user-select: none; }
      .div-header:hover { background: var(--surface2); }
      .div-name { font-size: 13px; font-weight: 700; letter-spacing: 0.3px; color: var(--text); flex: 1; }
      .div-stats { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
      .div-stat { font-size: 11px; color: var(--text3); }
      .div-stat strong { color: var(--text2); }
      .div-body { border-top: 1px solid var(--border); }
      .chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
      .chevron.open { transform: rotate(90deg); }

      /* ── Holdings table ─────────────────────────────────── */
      .holdings-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .holdings-table th {
        padding: 8px 12px;
        text-align: left;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text3);
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      .holdings-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
      .holdings-table tr:last-child td { border-bottom: none; }
      .holdings-table tr:hover td { background: rgba(34,211,238,0.02); }
      .holdings-table td.right { text-align: right; }
      .holdings-table td.center { text-align: center; }
      .holdings-table .num { font-variant-numeric: tabular-nums; font-weight: 600; }

      /* ── Platform badges ────────────────────────────────── */
      .platform-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 7px;
        border-radius: 3px;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        white-space: nowrap;
      }
      .platform-kite    { background: rgba(34,211,238,0.1);  color: #22d3ee; border: 1px solid rgba(34,211,238,0.2); }
      .platform-groww   { background: rgba(74,222,128,0.1);  color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
      .platform-indmoney{ background: rgba(167,139,250,0.1); color: #a78bfa; border: 1px solid rgba(167,139,250,0.2); }
      .platform-bank    { background: rgba(251,146,60,0.1);  color: #fb923c; border: 1px solid rgba(251,146,60,0.2); }
      .platform-other   { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }

      /* ── Asset type label ───────────────────────────────── */
      .asset-type {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        background: var(--surface3);
        color: var(--text3);
        border: 1px solid var(--border);
      }

      /* ── Forms ──────────────────────────────────────────── */
      .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
      .form-group { display: flex; flex-direction: column; gap: 3px; }
      .form-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }
      .input {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border2);
        border-radius: var(--radius-sm);
        padding: 7px 10px;
        font-size: 12px;
        font-family: var(--font-mono);
        width: 100%;
        transition: border-color 0.12s, background 0.12s;
      }
      .input:focus { outline: none; border-color: var(--cyan); background: var(--surface3); box-shadow: 0 0 0 2px rgba(34,211,238,0.08); }
      .input::placeholder { color: var(--text3); }
      .input-sm { padding: 5px 8px; font-size: 11px; }
      select.input { cursor: pointer; }

      /* ── Buttons ────────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.12s;
        white-space: nowrap;
        font-family: var(--font-mono);
      }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-sm { padding: 4px 10px; font-size: 10px; }
      .btn-xs { padding: 2px 7px; font-size: 10px; }
      .btn-primary { background: var(--cyan); color: #040810; border-color: var(--cyan); }
      .btn-primary:hover:not(:disabled) { background: #06b6d4; border-color: #06b6d4; }
      .btn-secondary { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
      .btn-secondary:hover:not(:disabled) { background: var(--surface3); color: var(--text); }
      .btn-success { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,128,0.25); }
      .btn-success:hover:not(:disabled) { background: rgba(74,222,128,0.2); }
      .btn-danger  { background: var(--red-dim);  color: var(--red);   border-color: rgba(248,113,113,0.25); }
      .btn-danger:hover:not(:disabled)  { background: rgba(248,113,113,0.2); }
      .btn-ghost { background: transparent; color: var(--text3); border-color: transparent; }
      .btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text2); }
      .btn-icon { padding: 3px 6px; background: transparent; color: var(--text3); border: none; cursor: pointer; border-radius: var(--radius-sm); font-size: 12px; }
      .btn-icon:hover { background: var(--surface2); color: var(--text); }

      /* ── Inline edit ────────────────────────────────────── */
      .editable { cursor: text; border-bottom: 1px dashed transparent; transition: border-color 0.12s; }
      .editable:hover { border-bottom-color: var(--border2); }

      /* ── P&L colors ─────────────────────────────────────── */
      .pos { color: var(--green); }
      .neg { color: var(--red); }
      .neu { color: var(--text2); }

      /* ── Progress bar ───────────────────────────────────── */
      .progress-bar { height: 3px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
      .progress-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }

      /* ── Tags ───────────────────────────────────────────── */
      .tags { display: flex; gap: 6px; flex-wrap: wrap; }

      /* ── Divider ────────────────────────────────────────── */
      .divider { height: 1px; background: var(--border); margin: 14px 0; }

      /* ── Goal seek table ────────────────────────────────── */
      .gs-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .gs-table th { padding: 9px 12px; text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); background: var(--surface2); border-bottom: 1px solid var(--border); }
      .gs-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
      .gs-table tr:last-child td { border-bottom: none; }
      .gs-table tr:hover td { background: rgba(34,211,238,0.02); }
      .gs-table td.right { text-align: right; }

      /* ── Action group ───────────────────────────────────── */
      .action-group { display: flex; gap: 4px; align-items: center; opacity: 0; transition: opacity 0.12s; }
      tr:hover .action-group, .div-header:hover .action-group, .sub-row:hover .action-group { opacity: 1; }

      /* ── Add holding panel ──────────────────────────────── */
      .add-holding-panel { background: var(--surface2); border-top: 1px solid var(--border); padding: 12px 16px; }

      /* ── Search dropdown ────────────────────────────────── */
      .search-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); z-index: 50; max-height: 200px; overflow-y: auto; box-shadow: 0 12px 32px rgba(0,0,0,0.6); }
      .search-item { padding: 8px 10px; font-size: 11px; cursor: pointer; color: var(--text2); }
      .search-item:hover { background: var(--surface3); color: var(--text); }
      .relative { position: relative; }

      /* ── Misc utils ─────────────────────────────────────── */
      .text-sm { font-size: 11px; }
      .text-xs { font-size: 10px; }
      .text-muted { color: var(--text2); }
      .text-dim { color: var(--text3); }
      .font-bold { font-weight: 700; }
      .font-black { font-weight: 900; }
      .flex { display: flex; }
      .flex-col { flex-direction: column; }
      .flex-wrap { flex-wrap: wrap; }
      .items-center { align-items: center; }
      .gap-1 { gap: 4px; }
      .gap-2 { gap: 8px; }
      .gap-3 { gap: 12px; }
      .gap-4 { gap: 16px; }
      .flex-1 { flex: 1; }
      .ml-auto { margin-left: auto; }
      .mr-2 { margin-right: 8px; }
      .mb-2 { margin-bottom: 8px; }
      .mb-3 { margin-bottom: 12px; }
      .mb-4 { margin-bottom: 16px; }
      .mt-2 { margin-top: 8px; }
      .mt-3 { margin-top: 12px; }
      .mt-4 { margin-top: 16px; }
      .w-full { width: 100%; }
      .hidden { display: none; }
      .spin { animation: spin 1s linear infinite; display: inline-block; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* ── Scrollbar ──────────────────────────────────────── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

      /* ── FIRE calc ──────────────────────────────────────── */
      .fire-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
      .fire-result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
      .fire-result-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 6px; }
      .fire-result-value { font-size: 20px; font-weight: 800; color: var(--text); }
      .fire-result-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
      .fire-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 18px; }

      /* ── Analytics ──────────────────────────────────────── */
      .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
      .metric-card { background: var(--surface2); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px; }
      .metric-label { font-size: 9px; color: var(--text3); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
      .metric-value { font-size: 18px; font-weight: 800; }

      /* ── Modal ──────────────────────────────────────────── */
      .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; backdrop-filter: blur(2px); }
      .modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 22px; width: 100%; max-width: 540px; }
      .modal-title { font-size: 13px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; margin: 0 0 18px 0; }

      /* ── Cursor blink (terminal feel) ───────────────────── */
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

      /* ── Responsive ─────────────────────────────────────── */
      @media (max-width: 640px) {
        .app-header-inner { gap: 10px; }
        .app-content { padding: 12px; }
        .kpi-row { grid-template-columns: 1fr 1fr; }
        .div-stats { display: none; }
        .app-title-sub { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
